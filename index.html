<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophia — AI Dialogues with History's Greatest Thinkers</title>
<link rel="canonical" href="https://egogogogogogo.github.io/philosophy/">
<meta name="description" content="Engage in deep, AI-powered conversations with 18 historical philosophers. Available in multiple languages.">
<meta name="keywords" content="philosophy, AI chatbot, Socrates, Nietzsche, Confucius, wisdom, dark mode">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===================== UTILITY BAR ===================== -->
<div class="utility-bar">
  <select class="lang-select" id="langSelect" onchange="setLanguage(this.value)" aria-label="Language">
    <option value="ko">한국어</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
    <option value="zh">中文</option>
  </select>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Theme">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"></svg>
  </button>
</div>

<!-- ===================== AD OVERLAY ===================== -->
<div class="ad-overlay" id="adOverlay" role="dialog">
  <div class="ad-modal">
    <div class="ad-modal-top">
      <span class="ad-modal-label" data-t="adLabel">Advertisement</span>
      <span class="ad-modal-countdown" id="adCountdown">5</span>
    </div>
    <div class="ad-modal-content">AD Area · 300 × 250</div>
    <button class="btn-premium" id="adSkipBtn" disabled onclick="skipAd()" data-t="skipAd" style="width: 100%">Continue</button>
  </div>
</div>

<!-- ===================== LEGAL MODAL ===================== -->
<div class="legal-modal" id="legalModal">
  <div class="legal-content">
    <button class="legal-close" onclick="closeLegal()">&times;</button>
    <div id="legalText" class="legal-text"></div>
  </div>
</div>

<!-- ===================== SCREEN: GALLERY ===================== -->
<div class="screen active" id="screen-gallery">
  <header class="site-header">
    <div class="header-ornament">Philosophia · 哲學 · فلسفه</div>
    <h1 class="site-title" data-t="siteTitle">哲學人의 房</h1>
    <p class="site-tagline" data-t="siteTagline">시대를 초월한 사상가들과의 대화</p>
  </header>

  <section class="gallery-section">
    <p class="gallery-heading" data-t="galleryHeading" style="text-align:center; margin-bottom: 4rem; font-style: italic; color: var(--cream3);">Choose a philosopher to begin your journey</p>
    <main class="gallery-grid" id="galleryGrid"></main>
  </section>

  <footer class="site-footer">
    <p data-t="footerText">© 2026 Philosophia · AI-Powered Dialogues with Great Thinkers</p>
    <div class="footer-links">
      <a onclick="showLegal('privacy')" data-t="privacy">Privacy</a>
      <a onclick="showLegal('terms')" data-t="terms">Terms</a>
      <a onclick="showLegal('about')" data-t="about">About</a>
      <a onclick="showLegal('contact')" data-t="contact">Contact</a>
    </div>
  </footer>
</div>

<!-- ===================== SCREEN: DETAIL ===================== -->
<div class="screen" id="screen-detail">
  <div style="padding: 2rem clamp(1.5rem, 6vw, 5rem);">
    <button class="btn-premium" onclick="goGallery()" data-t="backToGallery">← List</button>
  </div>
  <div id="detailHero"></div>
  <div id="topicsWrap" style="padding: 0 clamp(1.5rem, 10vw, 8rem) 6rem;"></div>
</div>

<!-- ===================== SCREEN: CHAT ===================== -->
<div class="screen" id="screen-chat" style="height: 100vh; overflow: hidden;">
  <div class="chat-topbar">
    <div id="chatAvatar" style="font-size: 2rem; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: var(--bg2); border: 1px solid var(--gold); border-radius: 50%;"></div>
    <div style="flex: 1;">
      <div class="chat-phil-name" id="chatName" style="font-family: 'Cinzel'; font-weight: 700; color: #fff;"></div>
      <div class="chat-topic-pill" id="chatTopicPill" style="font-size: 0.8rem; color: var(--gold3); font-style: italic; margin-top: 0.2rem;"></div>
    </div>
    <div style="display: flex; gap: 0.8rem;">
      <button class="btn-premium" onclick="goDetail()" data-t="changeTopic" style="padding: 0.5rem 1rem; font-size: 0.7rem;">Topic</button>
      <button class="btn-premium" onclick="switchPhil()" data-t="changePhil" style="padding: 0.5rem 1rem; font-size: 0.7rem;">Sage</button>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div style="padding: 1.5rem 2.5rem; background: var(--bg2); border-top: 1px solid var(--border);">
    <div style="display: flex; gap: 1rem; align-items: flex-end; max-width: 1000px; margin: 0 auto;">
      <textarea class="chat-input" id="chatInput" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-premium" id="sendBtn" onclick="sendMessage()" style="height: 50px; width: 60px; padding: 0;">↑</button>
    </div>
    <p id="inputHint" data-t="inputHint" style="font-size: 0.65rem; color: var(--cream3); text-align: right; margin-top: 0.6rem; letter-spacing: 0.05em;"></p>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
